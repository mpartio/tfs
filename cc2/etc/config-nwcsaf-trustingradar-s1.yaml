# Stage 1 of the trusting-radar CFM refinement.
#
# Purpose: take the MSE+CERRA+rollout=6 base (trusting-radar/1) and acquire
# (a) NWCSAF observation calibration via BCE-on-logit, (b) functional use of
# the x_alpha/alpha_map forcing channels (zero-padded on first load by
# _extend_proj_force_for_flow), and (c) partly-cloudy structure via SoftFSS.
#
# Bias is NOT a target for S1 — that's S2's job. S1 only needs to recover
# structural quality and BCE calibration to ~kinetic-creative-level. S2 will
# branch from S1's best checkpoint and address the bias under rollout=2.
#
# Falsification gate at step 15k (end of S1 — must hold before launching S2):
#   - partly-cloudy FSS at t+1 ≥ 0.55
#   - high-k power ratio at t+1 ≥ 0.18
#   - BCE-on-logit val_loss ≤ 0.40
#   - prediction histogram not collapsed to {0,1} (bimodality mass < 0.85)

seed_everything: 42

trainer:
  accelerator: auto
  strategy: ddp_find_unused_parameters_true
  devices: auto
  num_nodes: 8
  precision: bf16-mixed
  logger:
  - class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: cc2_trustingradar_s1
      save_dir: ./mlruns
      log_model: false
      prefix: ''
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_loss
      save_last: true
      save_top_k: 2
      mode: min
  - class_path: lightning.pytorch.callbacks.ModelSummary
    init_args:
      max_depth: 2
  - class_path: callback.callback.CleanupFailedRunCallback
  - class_path: callback.ew_callback.EarlyWarningMetricsCallback
    init_args:
      fss_threshold: 0.5
      fss_radius: 10
      log_train: true
      log_val: true
  - class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 20
  max_steps: 15000
  limit_val_batches: 0.5
  val_check_interval: 0.25
  log_every_n_steps: 100
  enable_model_summary: false
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0

model:
  class_path: cc2module.cc2module
  init_args:
    history_length: 2
    hidden_dim: 256
    patch_size: 4
    encoder1_depth: 16
    encoder2_depth: 4
    decoder1_depth: 4
    decoder2_depth: 16
    window_size: 6
    window_size_deep: 10
    num_heads: 8
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate:
    - 0.05
    - 0.01
    - 0.01
    - 0.1

    # lr: 7e-6 matches lumi.yaml (the working RF refinement of trusting-radar
    # from the same base); this is a regime-change refinement (MSE→BCE, CFM
    # activation) so the slightly higher lr vs S2's fine-tune is appropriate
    learning_rate: 7.0e-06
    warmup_iterations: 100
    weight_decay: 0.02

    rollout_length: 1
    branch_from_run: trusting-radar/1
    use_gradient_checkpointing: false
    model_family: swinu
    use_scheduled_sampling: false
    ss_pred_min: 0.0
    ss_pred_max: 1.0
    freeze_layers: []

    loss_fn:
      class_path: loss.combined.CombinedLoss
      init_args:
        losses:
        # BCE establishes NWCSAF calibration on logit; full weight from step 0.
        - class_path: loss.bce.BCELoss
          init_args:
            use_full_state: true
            eps: 0.0001
        # SoftFSS ramps in over the first 2k steps so BCE can establish the
        # bimodal calibration before SoftFSS's binarising pressure kicks in.
        - class_path: loss.softfss.SoftFSSLoss
          init_args:
            thresholds: [0.0625, 0.5625, 0.9375]
            window_sizes: [3, 6, 12]
            tau: 0.015625
            soften_true: false
            threshold_weights: [0.5, 0.35, 0.15]
            scale_weights: [0.5, 0.35, 0.15]
            eps: 1.0e-08
        weights: [1.0, 0.2]
        ramps:
        - null
        - class_path: loss.combined.RampConfig
          init_args:
            warmup_steps: 0
            ramp_steps: 2000
        names: [bce, soft_fss]

    test_output_directory: null
    use_rollout_weighting: false
    use_statistics_from_checkpoint: true
    force_frozen_backbone_to_eval: false
    preprocessor: null

    # Lipman CFM, standard kinetic-creative inference settings
    use_flow_matching: true
    num_inference_steps: 16
    flow_warm_start: false
    flow_eta: 0.05

    # α ~ U(0,1) for S1 — keep this axis orthogonal to other levers
    flow_alpha_a: 1.0
    flow_alpha_b: 1.0

data:
  data_path:
  - ../data/meps-nwcsaf-475x535-2020-2025-v4.zarr
  prognostic_params:
  - tcc
  forcing_params:
  - insolation
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - t_1000
  - t_500
  - t_700
  - t_850
  - t_925
  - u_1000
  - u_500
  - u_700
  - u_850
  - u_925
  - v_1000
  - v_500
  - v_700
  - v_850
  - v_925
  - z_1000
  - z_500
  - z_700
  - z_850
  - z_925
  - r_1000
  - r_500
  - r_700
  - r_850
  - r_925
  static_forcing_path: ../data/meps-const-v4.zarr
  static_forcing_params:
  - z
  - lsm
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  train_start: '2020-01-01'
  train_end: '2024-01-01'
  val_start: '2024-01-01'
  val_end: '2025-01-01'
  seed: 0
  batch_size: 1
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  normalization: null
  apply_smoothing: false
  data_options: {}
