# CFM-on-residual — Step 3 of the original three-experiment plan.
#
# Idea: instead of training the model to predict the full cloud-cover field
# y_clean at t+k, train it to predict the RESIDUAL y_clean − advected(x[-1],k).
# At inference, the rollout adds back the advected baseline:
#     final_prediction = advected + model_output(=residual)
#
# Why this might work where Path B (rolling-advection channel) didn't:
# - Path B exposed the model to a structured forcing channel and hoped the
#   model would learn to use it. The model ignored it (DE-13: zero-init
#   gradient deadlock).
# - CFM-on-residual redefines the TARGET so the channel is structurally
#   load-bearing: the model literally cannot recover the full prediction
#   without it. No way to "ignore" the advected baseline — it's added back
#   at the end of every rollout.
# - The residual target has a natural ~zero mean per step (if advection is
#   approximately right), which directly addresses the bias-accumulation
#   failure mode of Path B (S_BIAS 0.249).
#
# Loss: BCE on the RECONSTRUCTED prediction (advected + residual) vs truth y.
# Range is [0, 1] (after clamp) so BCE works without re-shifting. The model
# output (residual) can be negative, but BCE only sees the reconstructed
# value, not the residual directly.
#
# Branched from candied-circle/1 (the operational best). Path C ("CFM on
# residual" as originally written in the campaign plan) finally gets tested
# after Paths A, B, C′ exhausted.
#
# Probe gates at 1.5k steps:
#   - val BCE within +10% of candied-circle baseline
#   - S_BIAS ≥ 0.5 at probe (Path B's was 0.249 — must not regress like that)
#   - high-k power@t+1 ≥ 0.115
#   - prediction histogram remains bimodal (mass at extremes < 0.85)
#
# Ship gate at 10k:
#   - Phase-0 composite ≥ 0.470
#   - dynamic-event capture rate ≥ 35%
#   - bias@t+12 within ±0.020

seed_everything: 42

trainer:
  accelerator: auto
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  logger:
  - class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: cc2_cfm_residual
      save_dir: ./mlruns
      log_model: false
      prefix: ''
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_loss
      save_last: true
      save_top_k: 2
      mode: min
  - class_path: lightning.pytorch.callbacks.ModelSummary
    init_args:
      max_depth: 2
  - class_path: callback.callback.CleanupFailedRunCallback
  - class_path: callback.ew_callback.EarlyWarningMetricsCallback
    init_args:
      fss_threshold: 0.5
      fss_radius: 10
      log_train: true
      log_val: true
  - class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 20
  max_steps: 1500
  limit_val_batches: 0.25
  val_check_interval: 500
  log_every_n_steps: 50
  enable_model_summary: false
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0

model:
  class_path: cc2module.cc2module
  init_args:
    history_length: 2
    hidden_dim: 256
    patch_size: 4
    encoder1_depth: 16
    encoder2_depth: 4
    decoder1_depth: 4
    decoder2_depth: 16
    window_size: 6
    window_size_deep: 10
    num_heads: 8
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate:
    - 0.05
    - 0.01
    - 0.01
    - 0.1

    learning_rate: 5.0e-06
    warmup_iterations: 100
    weight_decay: 0.02

    rollout_length: 1
    branch_from_run: candied-circle/1
    use_gradient_checkpointing: false
    model_family: swinu
    use_scheduled_sampling: false
    ss_pred_min: 0.0
    ss_pred_max: 1.0
    freeze_layers: []

    loss_fn:
      class_path: loss.combined.CombinedLoss
      init_args:
        losses:
        - class_path: loss.bce.BCELoss
          init_args:
            use_full_state: true
            eps: 0.0001
        weights: [1.0]
        ramps:
        - null
        names: [bce]

    test_output_directory: null
    use_rollout_weighting: false
    use_statistics_from_checkpoint: true
    force_frozen_backbone_to_eval: false
    preprocessor: null

    use_flow_matching: true
    num_inference_steps: 16
    flow_warm_start: false
    flow_eta: 0.05
    flow_alpha_a: 1.0
    flow_alpha_b: 1.0
    flow_init_alpha: 0.85
    flow_alpha_schedule_rho: 1.0

    # The advection channel is still passed as a forcing input — informational.
    # In residual mode it's also load-bearing (added back at the end of rollout).
    use_advected_persistence: true
    advection_wind_level: '925'
    advection_secondary_level: '850'
    advection_secondary_weight: 0.6
    advection_dt_seconds: 10800.0
    advection_grid_spacing_m: 5000.0
    advection_flip_v_axis: true
    use_rolling_advection: false   # frozen-x0 residual_base for first iteration
    advection_proj_init: uv_blend_925_850  # carry forward the B′ init fix

    # THE key change: target is y − advected, not y itself
    use_residual_target: true

data:
  data_path:
  - ../data/meps-nwcsaf-475x535-2020-2025-v4.zarr
  prognostic_params:
  - tcc
  forcing_params:
  - insolation
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - t_1000
  - t_500
  - t_700
  - t_850
  - t_925
  - u_1000
  - u_500
  - u_700
  - u_850
  - u_925
  - v_1000
  - v_500
  - v_700
  - v_850
  - v_925
  - z_1000
  - z_500
  - z_700
  - z_850
  - z_925
  - r_1000
  - r_500
  - r_700
  - r_850
  - r_925
  static_forcing_path: ../data/meps-const-v4.zarr
  static_forcing_params:
  - z
  - lsm
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  train_start: '2020-01-01'
  train_end: '2024-01-01'
  val_start: '2024-01-01'
  val_end: '2025-01-01'
  seed: 0
  batch_size: 2
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 4
  pin_memory: true
  normalization: null
  apply_smoothing: false
