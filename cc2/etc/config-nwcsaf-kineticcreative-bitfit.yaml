# BitFit probe: bias-only fine-tune of kinetic-creative (DS distribution-shift playbook).
# Freezes all weights, trains ONLY bias + LayerNorm-affine. BCE-only, LR 1e-4, 2k steps.
# Falsifiable: clear-region t+1 tendency +0.13 -> ~0.01 with high-k UNCHANGED => prior is in
# output biases (LP-FT confirmed). No move => prior distributed in weights (full LP-FT needed).
# Runs on spark/ewc single-GPU, ~1 GPU-hr. branch_from_run: kinetic-creative/1.

seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  logger:
  - class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: cc2_nwcsaf_bitfit_probe
      run_name: null
      tracking_uri: null
      tags: null
      save_dir: ./mlruns
      log_model: false
      checkpoint_path_prefix: ''
      prefix: ''
      artifact_location: null
      run_id: null
      synchronous: null
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: null
      filename: null
      monitor: val_loss
      verbose: false
      save_last: true
      save_top_k: 2
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      every_n_train_steps: null
      train_time_interval: null
      every_n_epochs: null
      save_on_train_epoch_end: null
      enable_version_counter: true
  - class_path: lightning.pytorch.callbacks.ModelSummary
    init_args:
      max_depth: 2
  - class_path: callback.callback.CleanupFailedRunCallback
  - class_path: callback.ew_callback.EarlyWarningMetricsCallback
    init_args:
      fss_threshold: 0.5
      fss_radius: 10
      log_train: true
      log_val: true
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: 2000
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: 0.25
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 0.25
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: 100
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: false
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  model_registry: null
model:
  class_path: cc2module.cc2module
  init_args:
    history_length: 2
    hidden_dim: 256
    patch_size: 4
    encoder1_depth: 16
    encoder2_depth: 4
    decoder1_depth: 4
    decoder2_depth: 16
    window_size: 6
    window_size_deep: 10
    num_heads: 8
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate:
    - 0.05
    - 0.01
    - 0.01
    - 0.1
    learning_rate: 0.0001
    warmup_iterations: 50
    weight_decay: 0.02
    rollout_length: 1
    branch_from_run: kinetic-creative/1
    use_gradient_checkpointing: true
    model_family: swinu
    use_scheduled_sampling: false
    ss_pred_min: 0.0
    ss_pred_max: 1.0
    freeze_layers: []
    loss_fn:
      class_path: loss.bce.BCELoss
      init_args:
        use_full_state: true
        eps: 0.0001
    test_output_directory: null
    use_rollout_weighting: false
    use_statistics_from_checkpoint: true
    force_frozen_backbone_to_eval: false
    preprocessor: null
    use_flow_matching: true
    num_inference_steps: 16
    flow_warm_start: false
    flow_eta: 0.0
    train_bias_only: true
data:
  data_path:
  - /anemoi-data/meps-nwcsaf-475x535-2020-2025-v4.zarr
  prognostic_params:
  - tcc
  forcing_params:
  - insolation
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - t_1000
  - t_500
  - t_700
  - t_850
  - t_925
  - u_1000
  - u_500
  - u_700
  - u_850
  - u_925
  - v_1000
  - v_500
  - v_700
  - v_850
  - v_925
  - z_1000
  - z_500
  - z_700
  - z_850
  - z_925
  - r_1000
  - r_500
  - r_700
  - r_850
  - r_925
  static_forcing_path: /anemoi-data/meps-const-v4.zarr
  static_forcing_params:
  - z
  - lsm
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  train_start: '2020-01-01'
  train_end: '2024-01-01'
  val_start: '2024-01-01'
  val_end: '2025-01-01'
  test_start: null
  test_end: null
  predict_start: null
  predict_end: null
  seed: 0
  batch_size: 2
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true
  normalization: null
  apply_smoothing: false
  data_options: {}
optimizer: null
lr_scheduler: null
ckpt_path: null
logger: cc2_nwcsaf_bitfit_probe
