# Path B — rolling advection from the model's current state at each rollout step.
#
# Offline upper-bound diagnostic (May 2026) showed rolling advection has
# partial-r² of ~0.25 at every lead, vs frozen-x_0 at 0.014 by t+12 (18× ratio
# at the lead that matters). The wind-level choice barely affects partial-r²
# (linear blends of u/v are already in the span of the control features); the
# operation matters.
#
# Branches from candied-circle/1. NB: training is R=1, so the training step
# computes the channel exactly the same as frozen Path A (advect x[-1] by 1
# step). The difference between Path A and Path B is purely at INFERENCE,
# where Path B recomputes the channel from the model's prediction at each of
# the 12 rollout steps. This means one trained checkpoint can be evaluated in
# both modes; the toggle is `model.use_rolling_advection`.
#
# Train/inference mismatch caveat: training feeds the channel
#   advect(truth_at_analysis, 1step)
# Inference feeds the channel at step k+1
#   advect(model_pred_at_step_k, 1step)
# At short leads the model's predictions are decent surrogates for truth, but
# the gap grows with lead. If the probe shows the mismatch is the limiter, the
# follow-on experiment is R≥2 + scheduled sampling.
#
# Wind: 0.4·u_925 + 0.6·u_850 blend (physicist's recommendation; matches
# user's prior wind_advection_proof_of_concept which used 850-dominant).
#
# Falsification gate at the 1.5k-step probe (do NOT continue to 10k if any fails):
#   - validation BCE no worse than candied-circle by more than +10%
#   - high-k power@t+1 ≥ 0.115 (no spectral regression from new channel)
#   - prediction histogram remains bimodal (mass at extremes < 0.85)
#   - input-gradient on the adv channel ≥ 15% of u_925 gradient at t+4 (DS gate
#     — channel is actually being used, not ignored)
#
# Ship gate at 10k:
#   - Phase-0 composite ≥ 0.470
#   - dynamic-gate capture rate ≥ 35% (clearly above candied-circle's 28%)
#   - bias@t+12 within ±0.020

seed_everything: 42

trainer:
  accelerator: auto
  strategy: ddp_find_unused_parameters_true
  devices: auto
  num_nodes: 2
  precision: bf16-mixed
  logger:
  - class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: cc2_rolling_advection
      save_dir: ./mlruns
      log_model: false
      prefix: ''
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_loss
      save_last: true
      save_top_k: 2
      mode: min
  - class_path: lightning.pytorch.callbacks.ModelSummary
    init_args:
      max_depth: 2
  - class_path: callback.callback.CleanupFailedRunCallback
  - class_path: callback.ew_callback.EarlyWarningMetricsCallback
    init_args:
      fss_threshold: 0.5
      fss_radius: 10
      log_train: true
      log_val: true
  - class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 20
  max_steps: 10000
  limit_val_batches: 0.5
  val_check_interval: 0.25
  log_every_n_steps: 100
  enable_model_summary: false
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0

model:
  class_path: cc2module.cc2module
  init_args:
    history_length: 2
    hidden_dim: 256
    patch_size: 4
    encoder1_depth: 16
    encoder2_depth: 4
    decoder1_depth: 4
    decoder2_depth: 16
    window_size: 6
    window_size_deep: 10
    num_heads: 8
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate:
    - 0.05
    - 0.01
    - 0.01
    - 0.1

    learning_rate: 5.0e-06
    warmup_iterations: 100
    weight_decay: 0.02

    rollout_length: 1
    branch_from_run: candied-circle/1
    use_gradient_checkpointing: false
    model_family: swinu
    use_scheduled_sampling: false
    ss_pred_min: 0.0
    ss_pred_max: 1.0
    freeze_layers: []

    loss_fn:
      class_path: loss.combined.CombinedLoss
      init_args:
        losses:
        - class_path: loss.bce.BCELoss
          init_args:
            use_full_state: true
            eps: 0.0001
        weights: [1.0]
        ramps:
        - null
        names: [bce]

    test_output_directory: null
    use_rollout_weighting: false
    use_statistics_from_checkpoint: true
    force_frozen_backbone_to_eval: false
    preprocessor: null

    use_flow_matching: true
    num_inference_steps: 16
    flow_warm_start: false
    flow_eta: 0.05
    flow_alpha_a: 1.0
    flow_alpha_b: 1.0
    flow_init_alpha: 0.85
    flow_alpha_schedule_rho: 1.0

    # Advected-persistence with 0.4·925 + 0.6·850 wind blend
    use_advected_persistence: true
    advection_wind_level: '925'
    advection_secondary_level: '850'
    advection_secondary_weight: 0.6
    advection_dt_seconds: 10800.0
    advection_grid_spacing_m: 5000.0
    advection_flip_v_axis: true

    # Rolling advection — recompute channel from model state at each step
    use_rolling_advection: true

data:
  data_path:
  - ../data/meps-nwcsaf-475x535-2020-2025-v4.zarr
  prognostic_params:
  - tcc
  forcing_params:
  - insolation
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - t_1000
  - t_500
  - t_700
  - t_850
  - t_925
  - u_1000
  - u_500
  - u_700
  - u_850
  - u_925
  - v_1000
  - v_500
  - v_700
  - v_850
  - v_925
  - z_1000
  - z_500
  - z_700
  - z_850
  - z_925
  - r_1000
  - r_500
  - r_700
  - r_850
  - r_925
  static_forcing_path: ../data/meps-const-v4.zarr
  static_forcing_params:
  - z
  - lsm
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  train_start: '2020-01-01'
  train_end: '2024-01-01'
  val_start: '2024-01-01'
  val_end: '2025-01-01'
  seed: 0
  batch_size: 1
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  normalization: null
  apply_smoothing: false
