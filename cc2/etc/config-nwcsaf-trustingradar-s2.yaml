# Stage 2 of the trusting-radar CFM refinement.
#
# Branches from the S1 checkpoint (which has acquired BCE/NWCSAF calibration
# and CFM channel activation at R=1). S2 closes the long-rollout positive
# bias by training at R=2 with one-sided MeanConservation, while keeping
# SoftFSS at low weight to preserve partly-cloudy structure.
#
# IMPORTANT — set branch_from_run before launching: it should point to the
# S1 best checkpoint (e.g. trusting-radar-s1/1).
#
# Why rollout=2 (not R=6): mad-pan proved R=1 cannot move bias (no per-step
# accumulation gradient signal); R=6 stacks too many silent-collapse surfaces
# from a CFM-blind base. R=2 is the minimum that exposes the bias mechanism
# to the loss, gradients can backprop through two autoregressive steps cleanly.
#
# Why SoftFSS at 0.05 (not full 0.2 nor zero): kinetic-creative's partly-
# cloudy structure came from SoftFSS@0.2 at R=1. The SoftFSS+R>1 dead-end was
# observed at full weight (softfss-R6 binary collapse). Low-weight SoftFSS
# at R=2 acts as a structural regulariser, not a binarising force —
# unverified in cc2 history but the structural recovery in S1 should make
# the model stable enough to absorb the small SoftFSS signal at R=2.
#
# Why one-sided MeanConservation: mad-pan's symmetric variant moved bias
# by +0.001 (essentially zero). The dead-end log shows BCE+SoftFSS alone
# already establishes an equilibrium with positive bias; symmetric mean-
# conservation has zero gradient at that equilibrium. One-sided positive
# directionally pushes mean(pred) down without firing when under-forecast.
# The loss has been internally rescaled by H*W (see mean_conservation.py),
# so weight 0.30 corresponds to per-pixel gradient ~0.3 — comparable to BCE.
#
# Falsification gate at step 5k (early stop within S2):
#   - partly-cloudy FSS at t+1 must hold ≥ 0.55 (no regression from S1)
#   - high-k power ratio at t+1 ≥ 0.18 (no SoftFSS+R=2 collapse)
#   - bias at t+12 (validation) trending toward target — visible improvement
#     vs S1 baseline within 5k MeanCons-active steps
#
# Final target at end of S2 (vs kinetic-creative on July):
#   - composite ≥ 0.40
#   - bias at t+12 ≤ +0.030
#   - partly-cloudy FSS at t+1 ≥ 0.65
#   - high-k power ratio at t+1 ≥ 0.22

seed_everything: 42

trainer:
  accelerator: auto
  strategy: ddp_find_unused_parameters_true
  devices: auto
  num_nodes: 8
  precision: bf16-mixed
  logger:
  - class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: cc2_trustingradar_s2
      save_dir: ./mlruns
      log_model: false
      prefix: ''
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: val_loss
      save_last: true
      save_top_k: 2
      mode: min
  - class_path: lightning.pytorch.callbacks.ModelSummary
    init_args:
      max_depth: 2
  - class_path: callback.callback.CleanupFailedRunCallback
  - class_path: callback.ew_callback.EarlyWarningMetricsCallback
    init_args:
      fss_threshold: 0.5
      fss_radius: 10
      log_train: true
      log_val: true
  - class_path: lightning.pytorch.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 20
  max_steps: 15000
  limit_val_batches: 0.5
  val_check_interval: 0.25
  log_every_n_steps: 100
  enable_model_summary: false
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0

model:
  class_path: cc2module.cc2module
  init_args:
    history_length: 2
    hidden_dim: 256
    patch_size: 4
    encoder1_depth: 16
    encoder2_depth: 4
    decoder1_depth: 4
    decoder2_depth: 16
    window_size: 6
    window_size_deep: 10
    num_heads: 8
    mlp_ratio: 4.0
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate:
    - 0.05
    - 0.01
    - 0.01
    - 0.1

    # lr: 5e-6 — lower than S1's 7e-6 because S2 fine-tunes from a calibrated
    # base (S1 best ckpt) rather than doing a regime change
    learning_rate: 5.0e-06
    warmup_iterations: 100
    weight_decay: 0.02

    # R=2 — minimum exposure to bias accumulation across rollout
    rollout_length: 2
    use_rollout_weighting: true

    # SET THIS to S1's run dir before launching:
    branch_from_run: trusting-radar-s1/1

    use_gradient_checkpointing: false
    model_family: swinu
    use_scheduled_sampling: false
    ss_pred_min: 0.0
    ss_pred_max: 1.0
    freeze_layers: []

    loss_fn:
      class_path: loss.combined.CombinedLoss
      init_args:
        losses:
        # BCE keeps calibration — full weight throughout S2
        - class_path: loss.bce.BCELoss
          init_args:
            use_full_state: true
            eps: 0.0001
        # SoftFSS reduced from 0.2 (kinetic) → 0.05 to act as structural
        # regulariser at R=2 without re-creating softfss-R6 binarisation
        - class_path: loss.softfss.SoftFSSLoss
          init_args:
            thresholds: [0.0625, 0.5625, 0.9375]
            window_sizes: [3, 6, 12]
            tau: 0.015625
            soften_true: false
            threshold_weights: [0.5, 0.35, 0.15]
            scale_weights: [0.5, 0.35, 0.15]
            eps: 1.0e-08
        # MeanConservation: one-sided positive (only fires when over-forecasting),
        # internally rescaled by H*W so weight 0.30 ≈ per-pixel gradient 0.30.
        # Ramps in over steps 0–3000 so R=2 stability establishes before the
        # bias pressure compounds with BCE/SoftFSS gradients.
        - class_path: loss.mean_conservation.MeanConservationLoss
          init_args:
            one_sided_positive: true
            use_full_state: true
            hinge_tolerance: 0.005
        weights: [1.0, 0.05, 0.30]
        ramps:
        - null
        - null
        - class_path: loss.combined.RampConfig
          init_args:
            warmup_steps: 0
            ramp_steps: 3000
        names: [bce, soft_fss, mean_cons]

    test_output_directory: null
    use_statistics_from_checkpoint: true
    force_frozen_backbone_to_eval: false
    preprocessor: null

    use_flow_matching: true
    num_inference_steps: 16
    flow_warm_start: false
    flow_eta: 0.05

    flow_alpha_a: 1.0
    flow_alpha_b: 1.0

data:
  data_path:
  - ../data/meps-nwcsaf-475x535-2020-2025-v4.zarr
  prognostic_params:
  - tcc
  forcing_params:
  - insolation
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - t_1000
  - t_500
  - t_700
  - t_850
  - t_925
  - u_1000
  - u_500
  - u_700
  - u_850
  - u_925
  - v_1000
  - v_500
  - v_700
  - v_850
  - v_925
  - z_1000
  - z_500
  - z_700
  - z_850
  - z_925
  - r_1000
  - r_500
  - r_700
  - r_850
  - r_925
  static_forcing_path: ../data/meps-const-v4.zarr
  static_forcing_params:
  - z
  - lsm
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  train_start: '2020-01-01'
  train_end: '2024-01-01'
  val_start: '2024-01-01'
  val_end: '2025-01-01'
  seed: 0
  batch_size: 1
  num_workers: 2
  persistent_workers: true
  prefetch_factor: 2
  pin_memory: true
  normalization: null
  apply_smoothing: false
  data_options: {}
