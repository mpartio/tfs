# CFM-stage probe A — settles the SoftFSS ablation (rung 2 of the ladder, 2026-06-10).
# CFM de-blur fine-tune (exact noisy-buck recipe) on the hot-booth backbone
# (no-lead-embedding, BCE+SoftFSS) = the CURRENT full recipe, minus embedding.
# Compare per-category FSS at K=4 vs probe B (rust-emrasure, BCE-only end-to-end):
# if probe B matches within noise (dS_FSS<0.011, clear/overcast FSS gap closed),
# the CFM stage absorbs the backbone SoftFSS gap -> BCE-only pipeline viable.
# Direct-prediction is forcing-driven (no lead embedding).
# lightning.pytorch==2.6.0
seed_everything: 42
trainer:
  accelerator: auto
  strategy: ddp_find_unused_parameters_true
  devices: auto
  num_nodes: 4
  precision: bf16-mixed
  logger:
  - class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: cc2_nwcsaf_direct_prediction
      run_name: null
      tracking_uri: null
      tags: null
      save_dir: ./mlruns
      log_model: false
      prefix: ''
      artifact_location: null
      run_id: null
      synchronous: null
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: null
      filename: null
      monitor: val_loss
      verbose: false
      save_last: true
      save_top_k: 3
      save_on_exception: false
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      every_n_train_steps: null
      train_time_interval: null
      every_n_epochs: null
      save_on_train_epoch_end: null
      enable_version_counter: true
  - class_path: lightning.pytorch.callbacks.ModelSummary
    init_args:
      max_depth: 2
  - class_path: callback.callback.CleanupFailedRunCallback
  - class_path: lightning.pytorch.callbacks.EarlyStopping
    init_args:
      monitor: val_loss
      min_delta: 0.001
      patience: 6
      verbose: false
      mode: min
      strict: true
      check_finite: true
      stopping_threshold: null
      divergence_threshold: null
      check_on_train_epoch_end: false
      log_rank_zero_only: false
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: 20000
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: 0.5
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 500
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: 100
  enable_checkpointing: null
  enable_progress_bar: true
  enable_model_summary: false
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  enable_autolog_hparams: true
  model_registry: null
model:
  class_path: cc2module.cc2module
  init_args:
    history_length: 2
    hidden_dim: 256
    patch_size: 4
    encoder1_depth: 16
    encoder2_depth: 4
    decoder1_depth: 4
    decoder2_depth: 16
    window_size: 6
    window_size_deep: 10
    num_heads: 8
    mlp_ratio: 4.0
    drop_rate: 0.05
    attn_drop_rate: 0.0
    drop_path_rate:
    - 0.05
    - 0.01
    - 0.01
    - 0.15
    learning_rate: 5.0e-06
    warmup_iterations: 500
    weight_decay: 0.05
    rollout_length: 12
    branch_from_run: hot-booth/1
    use_gradient_checkpointing: true
    model_family: swinu
    use_scheduled_sampling: false
    ss_pred_min: 0.0
    ss_pred_max: 1.0
    freeze_layers: []
    loss_fn:
      class_path: loss.combined.CombinedLoss
      init_args:
        losses:
        - class_path: loss.bce.BCELoss
          init_args:
            use_full_state: true
            eps: 0.0001
        - class_path: loss.softfss.SoftFSSLoss
          init_args:
            thresholds:
            - 0.0625
            - 0.5625
            - 0.9375
            window_sizes:
            - 3
            - 6
            - 12
            tau: 0.015625
            soften_true: false
            threshold_weights:
            - 0.5
            - 0.35
            - 0.15
            scale_weights:
            - 0.5
            - 0.35
            - 0.15
            eps: 1.0e-08
        weights:
        - 1.0
        - 0.2
        ramps: null
        names:
        - bce
        - soft_fss
    test_output_directory: null
    use_rollout_weighting: false
    use_statistics_from_checkpoint: true
    force_frozen_backbone_to_eval: false
    preprocessor: null
    use_flow_matching: true
    num_inference_steps: 16
    flow_warm_start: false
    warm_start_alpha: 0.4
    flow_init_noise_sigma: 1.0
    flow_eta: 0.05
    direct_prediction: true
    lead_times: null
data:
  data_path:
  - ../data/meps-nwcsaf-475x535-2020-2025-v4.zarr
  prognostic_params:
  - tcc
  forcing_params:
  - insolation
  - cos_julian_day
  - sin_julian_day
  - cos_local_time
  - sin_local_time
  - t_1000
  - t_500
  - t_700
  - t_850
  - t_925
  - u_1000
  - u_500
  - u_700
  - u_850
  - u_925
  - v_1000
  - v_500
  - v_700
  - v_850
  - v_925
  - z_1000
  - z_500
  - z_700
  - z_850
  - z_925
  - r_1000
  - r_500
  - r_700
  - r_850
  - r_925
  static_forcing_path: ../data/meps-const-v4.zarr
  static_forcing_params:
  - z
  - lsm
  - cos_latitude
  - sin_latitude
  - cos_longitude
  - sin_longitude
  train_start: '2020-01-01'
  train_end: '2024-01-01'
  val_start: '2024-01-01'
  val_end: '2025-01-01'
  test_start: null
  test_end: null
  predict_start: null
  predict_end: null
  test_time_stride: null
  seed: 0
  batch_size: 1
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true
  normalization: null
  apply_smoothing: false
  data_options: {}
optimizer: null
lr_scheduler: null
ckpt_path: null
weights_only: null
